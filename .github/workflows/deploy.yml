name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Weekly rebuild so schedule statuses (past / next / upcoming) roll over
  # even when no content changes are pushed.
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set path prefix for project pages
        # Serves from /<repo>/ unless a custom domain (CNAME) is configured.
        run: |
          if [ -f src/CNAME ]; then
            echo "PATH_PREFIX=/" >> "$GITHUB_ENV"
          else
            echo "PATH_PREFIX=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
